<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @media screen and (max-width: 768px) {
            #lang-menu .dropdown-menu {
                right: auto !important;
                left: 0 !important;
            }

            #lang-menu.dropdown.is-right .dropdown-menu {
                right: auto !important;
                left: 0 !important;
            }
        }
        html, body {
            height: 100%;
        }
        body {
            display: flex;
            flex-direction: column;
        }
        footer {
            margin-top: auto;
        }
    </style>
<link rel="stylesheet" href="Assets/CSS/portafolio.css">
</head>
<body>
    <header>
            <nav class="navbar is-dark" role="navigation" aria-label="main navigation">
                <div class="navbar-brand">
                    <div class="navbar-item">
                        <a class="logo">
                            <img src="Assets/HTML/bearicon.svg" alt="Logo">
                        </a>
                    </div>
                    <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="NavBar">
                        <span aria-hidden="true"></span>
                        <span aria-hidden="true"></span>
                        <span aria-hidden="true"></span>
                        <span aria-hidden="true"></span>
                    </a>
                </div>
                <div id="NavBar" class="navbar-menu">
                    <div class="navbar-start">
                        <a class="navbar-item" href="index.html">
                            <span class="icon">
                                <i class="fa-solid fa-house"></i>
                            </span>
                            <span data-text="navstart"></span>
                        </a>
                        <a class="navbar-item" href="portafolio.html">
                            <span class="icon">
                                <i class="fa-solid fa-laptop-code"></i>
                            </span>
                            <span data-text="portfolio"></span>
                        </a>
                        <a class="navbar-item modal-trigger" data-target="modal-contact">
                            <span class="icon">
                                <i class="fa fa-id-card" aria-hidden="true"></i>
                            </span>
                            <span data-text="contact"></span>
                        </a>
                    </div>
                    <div class="navbar-end">
                        <div class="navbar-item">
                            <p class="control">
                                <a class="button is-primary" href="#">
                                    <span class="icon">
                                        <i class="fa fa-download" aria-hidden="true"></i>
                                    </span>
                                    <span data-text="downloadcv"></span>
                                </a>
                            </p>
                        </div>
                        <div class="navbar-item">
                            <div class="dropdown is-right" id="lang-menu">
                                <div class="dropdown-trigger">
                                    <button class="button is-dark">
                                    <span class="icon">
                                        <i class="fa-solid fa-language"></i>
                                    </span>
                                    </button>
                                </div>
                                <div class="dropdown-menu">
                                    <div class="dropdown-content">
                                    <a class="dropdown-item lang-opt" data-text="spa"></a>
                                    <a class="dropdown-item lang-opt" data-text="eng"></a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>
            <div class="navbar-item">
                <label class="theme-switch">
                    <button class="button is-dark" aria-label="themes" id="theme-btn">
                        <span class="icon">
                            <i class="fa-solid fa-moon theme-icon is-hidden"></i>
                            <i class="fa-solid fa-sun theme-icon is-hidden"></i>
                        </span>
                    </button>
                </label>
            </div>
        </header>
    <main>
        <div class="container">
            <section class="section" name="about">
                <div class="box">
                    <article class="media">
                        <div class="media-content">
                            <div class="content has-text-centered">
                                <h2 data-text="about-title"></h2>
                                <h3 data-text="about-subtitle"></h3>
                            </div>
                        </div>
                    </article>
                </div>
            </section>
            <section class="section page-menu" name="buttons-menu">
                <div class="buttons is-centered buttons-filter">
                    <button class="button is-rounded is-dark filter-menu" data-text="courses" data-filter="p1"></button>
                    <button class="button is-rounded is-dark filter-menu" data-text="skills" data-filter="p2"></button>
                    <button class="button is-rounded is-dark filter-menu" data-text="projects" data-filter="p3"></button>
                </div>
            </section>
            <section class="section page-section fade-out" name="courses" data-section="p1">
                <div class="columns is-mobile is-multiline is-centered">
                    <div class="column is-narrow">
                        <p data-text="course-1"></p>
                    </div>
                    <div class="column is-narrow">
                        <p data-text="course-2"></p>
                    </div>
                </div>
            </section>
            <section class="section page-section" name="buttons-skills" data-section="p2">
                <div class="buttons is-centered buttons-filter">
                    <button class="button is-rounded is-dark filter-skills" data-text="programming" data-filter="s1"></button>
                    <button class="button is-rounded is-dark filter-skills" data-text="databases" data-filter="s2"></button>
                    <button class="button is-rounded is-dark filter-skills" data-text="frameworks" data-filter="s3"></button>
                    <button class="button is-rounded is-dark filter-skills" data-text="3dmm" data-filter="s4"></button>
                    <button class="button is-rounded is-dark filter-skills" data-text="othertools" data-filter="s5"></button>
                </div>
            </section>
            <section class="section page-section" name="skills" data-section="p2">
                <div class="container">
                    <div class="box contentS-s1">
                        <p>Habilidad 1</p>
                    </div>
                    <div class="box contentS-s2">
                        <p>Habilidad 2</p>
                    </div>
                </div>
            </section>
            <section class="section page-section" name="buttons-projects" data-section="p3">
                <div class="buttons is-centered buttons-filter">
                    <button class="button is-rounded is-dark filter-projects" data-text="all" data-filter="all"></button>
                    <button class="button is-rounded is-dark filter-projects" data-text="software" data-filter="sw"></button>
                    <button class="button is-rounded is-dark filter-projects" data-text="web" data-filter="wb"></button>
                    <button class="button is-rounded is-dark filter-projects" data-text="3d" data-filter="3d"></button>
                    <button class="button is-rounded is-dark filter-projects" data-text="multimedia" data-filter="mm"></button>
                    <button class="button is-rounded is-dark filter-projects" data-text="others" data-filter="oth"></button>
                </div>
            </section>
            <section class="section page-section" name="projects" data-section="p3">
                    <div class="box contentP-sw">
                        <p>Software</p>
                    </div>
                    <div class="box contentP-wb">
                        <p>Web</p>
                    </div>
                    <div class="box contentP-3d">
                        <p>3D</p>
                    </div>
            </section>
            <div id="modal-contact" class="modal">
                <div class="modal-background"></div>
                <div class="modal-card">
                    <header class="modal-card-head">
                        <p class="modal-card-title">Contacto</p>
                        <button class="delete" aria-label="close"></button>
                    </header>
                    <section class="modal-card-body">
                        <h3>
                            Correo: <a class="link" href="emailto:juanpier1@outlook.com">juanpier1@outlook.com</a>
                        </h3>
                        <h3>
                            Télefono: <a class="link" href="tel:+528112096943">(+52)81 120 96943</a>
                        </h3>
                        <h3>Redes Sociales:</h3>
                        <h4>
                            <ul>
                                <li><a class="link" href="https://www.linkedin.com/in/jjpiern/">LinkedIn: Juan J. Pierluisi</a></li>
                                <li><a class="link" href="https://github.com/JuanPier1">GitHub: JuanPier1</a></li>
                            </ul>
                        </h4>
                    </section>
                    <footer class="modal-card-foot">
                        <div class="buttons">
                            <button class="button is-success" aria-label="close">Cerrar</button>
                        </div>
                    </footer>
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="content has-text-centered">
            <p>Realizado con <strong>Bulma</strong></p>
        </div>
    </footer>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="Assets/JS/portfolio.min.js"></script>
</body>
</html>
